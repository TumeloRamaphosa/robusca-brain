version: "3.9"

services:
  statix-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5180:5180"
      - "5181:5181"
    environment:
      - NODE_ENV=production
      - PORT=5181
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5181/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

